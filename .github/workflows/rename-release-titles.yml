name: Rinomina titoli release (one-off)

# Workflow temporaneo: uniforma il titolo di TUTTE le release esistenti al
# formato <tag con '/' sostituita da '_'> (es. report-call/v1.0.0 -> titolo
# report-call_v1.0.0). Da eseguire una volta e poi rimuovere.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - name: Normalizza i titoli
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release list --repo "$REPO" --limit 200 --json tagName --jq '.[].tagName' \
            | while read -r TAG; do
                [ -z "$TAG" ] && continue
                NEW="${TAG//\//_}"
                echo "Rinomino \"$TAG\" -> titolo \"$NEW\""
                gh release edit "$TAG" --repo "$REPO" --title "$NEW"
              done
