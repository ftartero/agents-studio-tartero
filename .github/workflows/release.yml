name: Release

# Crea automaticamente una GitHub Release ogni volta che viene pushato
# un tag nel formato v* (es. v1.0.0). Le note della release vengono
# generate automaticamente a partire dai commit e dalle modifiche.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Crea la Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
